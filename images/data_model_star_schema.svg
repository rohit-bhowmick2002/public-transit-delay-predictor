<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%" style="background:#0F172A; font-family:'Segoe UI', Helvetica, Arial, sans-serif; border-radius: 12px;">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <marker id="crow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <!-- Crow's foot notation representing "Many" relationship -->
      <path d="M 0 2 L 8 5 L 0 8 M 8 2 L 8 8" fill="none" stroke="#64748B" stroke-width="1.5"/>
    </marker>
    <marker id="one" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <!-- One notation representing "1" relationship -->
      <path d="M 4 2 L 4 8 M 7 2 L 7 8" fill="none" stroke="#64748B" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1000" height="450" fill="#0F172A" rx="12"/>
  <circle cx="500" cy="225" r="300" fill="url(#glow)"/>

  <!-- TITLE -->
  <text x="50" y="40" fill="#F8FAFC" font-size="20" font-weight="800" letter-spacing="1">PREDICT TRANSIT STAR SCHEMA MODEL</text>
  <text x="50" y="60" fill="#64748B" font-size="12">1:Many Relational Data Warehousing Structures (SQLite / PostgreSQL Compatible)</text>

  <!-- ================= FACT TABLE: fact_transit_trips ================= -->
  <g transform="translate(380, 80)">
    <rect width="240" height="290" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
    <path d="M 0,0 L 240,0 L 240,35 L 0,35 Z" fill="#2563EB" rx="6" clip-path="inset(0 0 255 0)"/>
    <text x="120" y="22" fill="#F8FAFC" font-size="12" font-weight="bold" text-anchor="middle">fact_transit_trips</text>
    
    <!-- Fields -->
    <text x="15" y="60" fill="#F43F5E" font-size="11" font-weight="bold">trip_id</text>
    <text x="120" y="60" fill="#64748B" font-size="11">INTEGER [PK, Auto]</text>

    <text x="15" y="85" fill="#3B82F6" font-size="11" font-weight="bold">date_time</text>
    <text x="120" y="85" fill="#64748B" font-size="11">TEXT [FK -> weather]</text>

    <text x="15" y="110" fill="#3B82F6" font-size="11" font-weight="bold">sector_id</text>
    <text x="120" y="110" fill="#64748B" font-size="11">INTEGER [FK -> traffic]</text>

    <text x="15" y="135" fill="#94A3B8" font-size="11" font-weight="bold">route_id</text>
    <text x="120" y="135" fill="#64748B" font-size="11">TEXT</text>

    <text x="15" y="160" fill="#94A3B8" font-size="11" font-weight="bold">bus_id</text>
    <text x="120" y="160" fill="#64748B" font-size="11">TEXT</text>

    <text x="15" y="185" fill="#94A3B8" font-size="11" font-weight="bold">stop_id</text>
    <text x="120" y="185" fill="#64748B" font-size="11">TEXT</text>

    <text x="15" y="210" fill="#94A3B8" font-size="11" font-weight="bold">stop_sequence</text>
    <text x="120" y="210" fill="#64748B" font-size="11">INTEGER</text>

    <text x="15" y="235" fill="#34D399" font-size="11" font-weight="bold">scheduled_arrival</text>
    <text x="120" y="235" fill="#64748B" font-size="11">TEXT [FK -> holidays]</text>

    <text x="15" y="260" fill="#94A3B8" font-size="11" font-weight="bold">actual_arrival</text>
    <text x="120" y="260" fill="#64748B" font-size="11">TEXT</text>

    <text x="15" y="285" fill="#FBBF24" font-size="11" font-weight="bold">delay_minutes</text>
    <text x="120" y="285" fill="#64748B" font-size="11">REAL [Target]</text>
  </g>

  <!-- ================= DIMENSION: dim_weather ================= -->
  <g transform="translate(60, 40)">
    <rect width="220" height="170" fill="#1E293B" stroke="#475569" stroke-width="1" rx="6"/>
    <path d="M 0,0 L 220,0 L 220,30 L 0,30 Z" fill="#475569" rx="6" clip-path="inset(0 0 140 0)"/>
    <text x="110" y="19" fill="#F8FAFC" font-size="11" font-weight="bold" text-anchor="middle">dim_weather</text>
    
    <text x="15" y="55" fill="#F43F5E" font-size="10" font-weight="bold">timestamp</text>
    <text x="100" y="55" fill="#64748B" font-size="10">TEXT [PK]</text>

    <text x="15" y="75" fill="#94A3B8" font-size="10">temperature</text>
    <text x="100" y="75" fill="#64748B" font-size="10">REAL</text>

    <text x="15" y="95" fill="#94A3B8" font-size="10">rainfall</text>
    <text x="100" y="95" fill="#64748B" font-size="10">REAL</text>

    <text x="15" y="115" fill="#94A3B8" font-size="10">humidity</text>
    <text x="100" y="115" fill="#64748B" font-size="10">INTEGER</text>

    <text x="15" y="135" fill="#94A3B8" font-size="10">visibility</text>
    <text x="100" y="135" fill="#64748B" font-size="10">REAL</text>

    <text x="15" y="155" fill="#94A3B8" font-size="10">weather_condition</text>
    <text x="100" y="155" fill="#64748B" font-size="10">TEXT</text>
  </g>

  <!-- ================= DIMENSION: dim_traffic ================= -->
  <g transform="translate(60, 240)">
    <rect width="220" height="170" fill="#1E293B" stroke="#475569" stroke-width="1" rx="6"/>
    <path d="M 0,0 L 220,0 L 220,30 L 0,30 Z" fill="#475569" rx="6" clip-path="inset(0 0 140 0)"/>
    <text x="110" y="19" fill="#F8FAFC" font-size="11" font-weight="bold" text-anchor="middle">dim_traffic</text>
    
    <text x="15" y="55" fill="#F43F5E" font-size="10" font-weight="bold">timestamp</text>
    <text x="115" y="55" fill="#64748B" font-size="10">TEXT [PK]</text>

    <text x="15" y="75" fill="#F43F5E" font-size="10" font-weight="bold">sector_id</text>
    <text x="115" y="75" fill="#64748B" font-size="10">INTEGER [PK]</text>

    <text x="15" y="95" fill="#94A3B8" font-size="10">traffic_level</text>
    <text x="115" y="95" fill="#64748B" font-size="10">TEXT</text>

    <text x="15" y="115" fill="#94A3B8" font-size="10">congestion_score</text>
    <text x="115" y="115" fill="#64748B" font-size="10">REAL</text>

    <text x="15" y="135" fill="#94A3B8" font-size="10">road_closure_flag</text>
    <text x="115" y="135" fill="#64748B" font-size="10">INTEGER</text>

    <text x="15" y="155" fill="#94A3B8" font-size="10">accident_count</text>
    <text x="115" y="155" fill="#64748B" font-size="10">INTEGER</text>
  </g>

  <!-- ================= DIMENSION: dim_holidays ================= -->
  <g transform="translate(720, 40)">
    <rect width="220" height="130" fill="#1E293B" stroke="#475569" stroke-width="1" rx="6"/>
    <path d="M 0,0 L 220,0 L 220,30 L 0,30 Z" fill="#475569" rx="6" clip-path="inset(0 0 100 0)"/>
    <text x="110" y="19" fill="#F8FAFC" font-size="11" font-weight="bold" text-anchor="middle">dim_holidays</text>
    
    <text x="15" y="55" fill="#F43F5E" font-size="10" font-weight="bold">date</text>
    <text x="100" y="55" fill="#64748B" font-size="10">TEXT [PK]</text>

    <text x="15" y="75" fill="#94A3B8" font-size="10">holiday_flag</text>
    <text x="100" y="75" fill="#64748B" font-size="10">INTEGER</text>

    <text x="15" y="95" fill="#94A3B8" font-size="10">festival_name</text>
    <text x="100" y="95" fill="#64748B" font-size="10">TEXT</text>

    <text x="15" y="115" fill="#94A3B8" font-size="10">weekend_flag</text>
    <text x="100" y="115" fill="#64748B" font-size="10">INTEGER</text>
  </g>

  <!-- ================= DIMENSION: dim_events ================= -->
  <g transform="translate(720, 240)">
    <rect width="220" height="170" fill="#1E293B" stroke="#475569" stroke-width="1" rx="6"/>
    <path d="M 0,0 L 220,0 L 220,30 L 0,30 Z" fill="#475569" rx="6" clip-path="inset(0 0 140 0)"/>
    <text x="110" y="19" fill="#F8FAFC" font-size="11" font-weight="bold" text-anchor="middle">dim_events</text>
    
    <text x="15" y="55" fill="#F43F5E" font-size="10" font-weight="bold">event_id</text>
    <text x="110" y="55" fill="#64748B" font-size="10">INTEGER [PK]</text>

    <text x="15" y="75" fill="#94A3B8" font-size="10">event_name</text>
    <text x="110" y="75" fill="#64748B" font-size="10">TEXT</text>

    <text x="15" y="95" fill="#94A3B8" font-size="10">event_type</text>
    <text x="110" y="95" fill="#64748B" font-size="10">TEXT</text>

    <text x="15" y="115" fill="#94A3B8" font-size="10">venue_coordinates</text>
    <text x="110" y="115" fill="#64748B" font-size="10">REAL [Lat, Lon]</text>

    <text x="15" y="135" fill="#94A3B8" font-size="10">crowd_size</text>
    <text x="110" y="135" fill="#64748B" font-size="10">INTEGER</text>

    <text x="15" y="155" fill="#94A3B8" font-size="10">timespan</text>
    <text x="110" y="155" fill="#64748B" font-size="10">TEXT [Start, End]</text>
  </g>

  <!-- ================= RELATIONSHIP CONNECTIONS ================= -->
  
  <!-- dim_weather -> fact (date_time) -->
  <path d="M 280,125 L 340,125 L 340,165 L 380,165" stroke="#64748B" stroke-width="1.5" fill="none" marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- dim_traffic -> fact (timestamp + sector_id) -->
  <path d="M 280,325 L 340,325 L 340,190 L 380,190" stroke="#64748B" stroke-width="1.5" fill="none" marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- dim_holidays -> fact (DATE(scheduled_arrival)) -->
  <path d="M 720,105 L 660,105 L 660,240 L 620,240" stroke="#64748B" stroke-width="1.5" fill="none" marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- dim_events is unlinked statically (mapped dynamically via Haversine distance in python!) -->
  <path d="M 720,325 L 660,325 L 660,315 L 620,315" stroke="#64748B" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#crow)"/>
  <text x="690" y="305" fill="#8B5CF6" font-size="9" text-anchor="middle" font-weight="bold">Dynamic Spatial Join</text>

</svg>
