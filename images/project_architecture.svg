<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%" style="background:#0F172A; font-family:'Segoe UI', Helvetica, Arial, sans-serif; border-radius: 12px;">
  <!-- Background glow / gradients -->
  <defs>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="emeraldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1000" height="450" fill="#0F172A" rx="12"/>

  <!-- Glow Areas -->
  <circle cx="200" cy="225" r="250" fill="url(#blueGlow)"/>
  <circle cx="500" cy="225" r="200" fill="url(#purpleGlow)"/>
  <circle cx="800" cy="225" r="250" fill="url(#emeraldGlow)"/>

  <!-- Grid overlay -->
  <path d="M 0,50 L 1000,50 M 0,100 L 1000,100 M 0,150 L 1000,150 M 0,200 L 1000,200 M 0,250 L 1000,250 M 0,300 L 1000,300 M 0,350 L 1000,350 M 0,400 L 1000,400" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="5,5"/>
  <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450 M 800,0 L 800,450 M 900,0 L 900,450" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="5,5"/>

  <!-- TITLE -->
  <text x="50" y="40" fill="#F8FAFC" font-size="20" font-weight="800" letter-spacing="1">PREDICT TRANSIT SYSTEM ARCHITECTURE</text>
  <text x="50" y="60" fill="#64748B" font-size="12">End-to-End Modular Data Engineering &amp; ML Production Pipeline</text>

  <!-- ================= STAGE 1: DATA SOURCES ================= -->
  <g transform="translate(50, 100)">
    <rect width="180" height="280" fill="url(#cardGrad)" stroke="#334155" stroke-width="1" rx="8"/>
    <rect width="180" height="35" fill="#1E293B" rx="8" clip-path="inset(0 0 245 0)"/>
    <text x="90" y="22" fill="#3B82F6" font-size="12" font-weight="bold" text-anchor="middle">1. DATA SOURCES</text>
    
    <!-- Items -->
    <g transform="translate(15, 60)">
      <rect width="150" height="36" fill="#0F172A" stroke="#1E293B" rx="4"/>
      <text x="45" y="22" fill="#94A3B8" font-size="11" font-weight="bold">GTFS Transit logs</text>
      <!-- Icon representation -->
      <circle cx="25" cy="18" r="8" fill="#2563EB" opacity="0.2"/>
      <path d="M 22,18 L 28,18 M 25,15 L 25,21" stroke="#3B82F6" stroke-width="1.5"/>
    </g>
    <g transform="translate(15, 110)">
      <rect width="150" height="36" fill="#0F172A" stroke="#1E293B" rx="4"/>
      <text x="45" y="22" fill="#94A3B8" font-size="11" font-weight="bold">Open-Meteo Weather</text>
      <circle cx="25" cy="18" r="8" fill="#F59E0B" opacity="0.2"/>
      <path d="M 22,18 Q 25,14 28,18" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
    </g>
    <g transform="translate(15, 160)">
      <rect width="150" height="36" fill="#0F172A" stroke="#1E293B" rx="4"/>
      <text x="45" y="22" fill="#94A3B8" font-size="11" font-weight="bold">Local Events APIs</text>
      <circle cx="25" cy="18" r="8" fill="#8B5CF6" opacity="0.2"/>
      <path d="M 21,18 L 29,18 M 25,14 L 25,22" stroke="#8B5CF6" stroke-width="1.5"/>
    </g>
    <g transform="translate(15, 210)">
      <rect width="150" height="36" fill="#0F172A" stroke="#1E293B" rx="4"/>
      <text x="45" y="22" fill="#94A3B8" font-size="11" font-weight="bold">Live Traffic Feeds</text>
      <circle cx="25" cy="18" r="8" fill="#EF4444" opacity="0.2"/>
      <path d="M 21,21 L 29,15" stroke="#EF4444" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Connection Arrow 1 -> 2 -->
  <path d="M 230,240 L 320,240" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- ================= STAGE 2: DATA STORAGE ================= -->
  <g transform="translate(330, 100)">
    <rect width="180" height="280" fill="url(#cardGrad)" stroke="#334155" stroke-width="1" rx="8"/>
    <rect width="180" height="35" fill="#1E293B" rx="8" clip-path="inset(0 0 245 0)"/>
    <text x="90" y="22" fill="#8B5CF6" font-size="12" font-weight="bold" text-anchor="middle">2. STORAGE &amp; SQL</text>

    <!-- DB Cylinders -->
    <g transform="translate(30, 70)">
      <path d="M 30,20 C 30,10 90,10 90,20 L 90,70 C 90,80 30,80 30,70 Z" fill="#6D28D9" fill-opacity="0.3" stroke="#8B5CF6" stroke-width="2"/>
      <path d="M 30,20 C 30,30 90,30 90,20" fill="none" stroke="#8B5CF6" stroke-width="2"/>
      <path d="M 30,35 C 30,45 90,45 90,35" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="2,2"/>
      <path d="M 30,50 C 30,60 90,60 90,50" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="2,2"/>
      <text x="60" y="105" fill="#F8FAFC" font-size="11" font-weight="bold" text-anchor="middle">Relational Engine</text>
      <text x="60" y="122" fill="#94A3B8" font-size="10" text-anchor="middle">PostgreSQL / SQLite</text>
    </g>

    <!-- SQL Block -->
    <g transform="translate(15, 215)">
      <rect width="150" height="45" fill="#0F172A" stroke="#475569" rx="4"/>
      <text x="75" y="20" fill="#A7F3D0" font-size="11" font-weight="bold" text-anchor="middle">50 Business Queries</text>
      <text x="75" y="34" fill="#64748B" font-size="9" text-anchor="middle">CTEs, Window Fns, Joins</text>
    </g>
  </g>

  <!-- Split Connections from Stage 2 to Stage 3 (Analytics) and Stage 4 (ML) -->
  <path d="M 510,180 L 600,150" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 510,300 L 600,330" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ================= STAGE 3: ANALYTICS ================= -->
  <g transform="translate(610, 50)">
    <rect width="160" height="150" fill="url(#cardGrad)" stroke="#334155" stroke-width="1" rx="8"/>
    <rect width="160" height="30" fill="#1E293B" rx="8" clip-path="inset(0 0 120 0)"/>
    <text x="80" y="19" fill="#10B981" font-size="11" font-weight="bold" text-anchor="middle">3A. BI DASHBOARD</text>
    
    <text x="20" y="60" fill="#F8FAFC" font-size="11" font-weight="bold">Power BI Reports</text>
    <text x="20" y="78" fill="#94A3B8" font-size="10">• 5 Analytical Pages</text>
    <text x="20" y="94" fill="#94A3B8" font-size="10">• Complex DAX Measures</text>
    <text x="20" y="110" fill="#94A3B8" font-size="10">• Executive Insights</text>
    
    <!-- Power BI Color Bar -->
    <rect x="0" y="145" width="160" height="5" fill="#F59E0B" rx="2"/>
  </g>

  <!-- ================= STAGE 4: MODELING ================= -->
  <g transform="translate(610, 250)">
    <rect width="160" height="150" fill="url(#cardGrad)" stroke="#334155" stroke-width="1" rx="8"/>
    <rect width="160" height="30" fill="#1E293B" rx="8" clip-path="inset(0 0 120 0)"/>
    <text x="80" y="19" fill="#EC4899" font-size="11" font-weight="bold" text-anchor="middle">3B. ML PIPELINE</text>
    
    <text x="20" y="60" fill="#F8FAFC" font-size="11" font-weight="bold">Gradient Boosting</text>
    <text x="20" y="78" fill="#94A3B8" font-size="10">• Temporal Data Split</text>
    <text x="20" y="94" fill="#94A3B8" font-size="10">• Feature Engineering</text>
    <text x="20" y="110" fill="#94A3B8" font-size="10">• MAE: 1.9 Mins | R²: 0.85</text>
    
    <!-- ML Color Bar -->
    <rect x="0" y="145" width="160" height="5" fill="#EC4899" rx="2"/>
  </g>

  <!-- Connection to Streamlit -->
  <path d="M 770,125 L 810,125 L 810,210 L 830,210" stroke="#64748B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 770,325 L 810,325 L 810,240 L 830,240" stroke="#64748B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ================= STAGE 5: DEPLOYMENT ================= -->
  <g transform="translate(840, 150)">
    <rect width="130" height="150" fill="url(#cardGrad)" stroke="#334155" stroke-width="1" rx="8"/>
    <rect width="130" height="30" fill="#1E293B" rx="8" clip-path="inset(0 0 120 0)"/>
    <text x="65" y="19" fill="#EF4444" font-size="11" font-weight="bold" text-anchor="middle">4. DEPLOYMENT</text>
    
    <text x="65" y="65" fill="#F8FAFC" font-size="12" font-weight="bold" text-anchor="middle">Streamlit App</text>
    <text x="65" y="85" fill="#10B981" font-size="10" font-weight="bold" text-anchor="middle">● LIVE SERVICE</text>
    
    <!-- Wireframe represent -->
    <g transform="translate(20, 105)">
      <rect width="90" height="30" fill="#0F172A" stroke="#475569" rx="2"/>
      <rect x="5" y="5" width="25" height="20" fill="#1E293B" rx="1"/>
      <line x1="40" y1="10" x2="80" y2="10" stroke="#94A3B8" stroke-width="2"/>
      <line x1="40" y1="18" x2="70" y2="18" stroke="#94A3B8" stroke-width="2"/>
    </g>
  </g>
</svg>
